<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 경고 로그</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        button { padding: 10px 15px; background: #222; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: #fafafa; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>📋 실시간 경고 로그</h2>
        <button onclick="downloadTXT()">📄 TXT 다운로드</button>
    </div>
    <div class="table-wrapper">
        <table id="logTable">
            <thead><tr id="tableHeader"></tr></thead>
            <tbody id="tableBody"><tr><td colspan="5" style="text-align:center;">데이터를 불러오는 중...</td></tr></tbody>
        </table>
    </div>
</div>

<script>
    const URL = 'https://gzhesjteggilonfclviy.supabase.co';
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6aGVzanRlZ2dpbG9uZmNsdml5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNjE2MTEsImV4cCI6MjA4OTczNzYxMX0.8ZwIClCJ3bOU_zhAl0uAiBTEJGvKaDl9G8DrLgkX5HA';
    
    let client;
    let cachedData = [];

    window.onload = async function() {
        if (typeof window.supabase === 'undefined') {
            alert("라이브러리 로드 실패!");
            return;
        }
        client = window.supabase.createClient(URL, KEY);
        await fetchData();
    };

    async function fetchData() {
        try {
            // .table('경고')를 .from('경고')로 수정했습니다!
            const { data, error } = await client
                .from('경고') 
                .select('*')
                .order('created_at', { ascending: false });

            if (error) throw error;

            cachedData = data;
            renderTable(data);
        } catch (e) {
            console.error("데이터 로드 에러:", e);
            document.getElementById('tableBody').innerHTML = `<tr><td colspan="5" style="color:red; text-align:center;">에러: ${e.message}</td></tr>`;
        }
    }

    function renderTable(data) {
        if (!data || data.length === 0) {
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" style="text-align:center;">데이터가 없습니다.</td></tr>';
            return;
        }
        const header = document.getElementById('tableHeader');
        const body = document.getElementById('tableBody');
        
        header.innerHTML = Object.keys(data[0]).map(k => `<th>${k}</th>`).join('');
        body.innerHTML = data.map(row => `<tr>${Object.values(row).map(v => `<td>${v}</td>`).join('')}</tr>`).join('');
    }

    function downloadTXT() {
        if (cachedData.length === 0) return alert("다운로드할 데이터가 없습니다.");
        let text = "=== 경고 기록 로그 ===\n\n";
        cachedData.forEach(row => {
            text += Object.entries(row).map(([k, v]) => `[${k}]: ${v}`).join(' | ') + "\n";
        });
        const blob = new Blob([text], { type: 'text/plain' });
        const downloadUrl = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = downloadUrl;
        a.download = 'warning_logs.txt';
        a.click();
    }
</script>

</body>
</html>
